<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3구역 주간 달성률 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg:#f6f8fc; --panel:#ffffff; --text:#18212f; --muted:#5f6b7a; --line:#d9e1ee;
    --navy:#1e3a5f; --blue:#2f6fed; --green:#16a34a; --amber:#d97706; --red:#dc2626;
    --shadow:0 10px 30px rgba(23,38,66,.08); --radius:20px;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Pretendard","Apple SD Gothic Neo",sans-serif; background:linear-gradient(180deg,#f7f9fd 0%,#eef3fb 100%); color:var(--text); }
  .wrap { max-width:1440px; margin:0 auto; padding:24px 16px; }
  .hero { display:flex; align-items:flex-end; justify-content:space-between; gap:24px; margin-bottom:20px; flex-wrap:wrap; }
  .hero h1 { margin:0 0 6px; font-size:28px; }
  .toolbar { display:flex; gap:12px; align-items:center; background:rgba(255,255,255,.8); padding:10px 16px; border-radius:999px; border:1px solid var(--line); box-shadow:var(--shadow); }
  label { font-size:13px; font-weight:bold; color:var(--muted); }
  select { border:1px solid var(--line); border-radius:999px; padding:8px 12px; font-size:14px; background:#fff; cursor:pointer; }
  .grid { display:grid; grid-template-columns:1.1fr 1.1fr .8fr; gap:18px; margin-bottom:18px; }
  .layout2 { display:grid; grid-template-columns:1.25fr .75fr; gap:18px; margin-bottom:18px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; }
  .card h3 { margin:0 0 4px; font-size:18px; }
  .sub { color:var(--muted); font-size:12px; margin-bottom:14px; }
  .metric-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .metric { background:#f8fbff; border:1px solid #e3ebf7; border-radius:16px; padding:12px; }
  .metric .label { font-size:12px; color:var(--muted); font-weight:bold; margin-bottom:6px; }
  .metric .value { font-size:24px; font-weight:900; }
  .metric .delta { font-size:11px; color:var(--muted); margin-top:4px; font-weight:bold; }
  .bars { display:flex; flex-direction:column; gap:10px; }
  .bar-row { display:grid; grid-template-columns:70px 45px 1fr 50px; align-items:center; gap:8px; font-size:13px; }
  .track { height:14px; background:#e9eef7; border-radius:999px; overflow:hidden; }
  .fill { height:100%; border-radius:999px; background:linear-gradient(90deg,#2f6fed,#62a6ff); }
  .leaders { display:grid; gap:10px; }
  .leader { display:flex; align-items:center; justify-content:space-between; background:#f8fbff; border:1px solid #e3ebf7; border-radius:14px; padding:10px 12px; }
  .badge { padding:6px 10px; border-radius:999px; background:#eff6ff; color:#2459c3; font-weight:bold; font-size:12px; }
  .chartbox { height:320px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { background:#f4f8ff; padding:10px; border-bottom:1px solid var(--line); text-align:center; }
  td { padding:10px; border-bottom:1px solid #edf2f9; text-align:center; }
  td:first-child { text-align:left; font-weight:bold; }
  .table-wrap { overflow-x:auto; max-height:420px; border:1px solid var(--line); border-radius:12px; }
  .heat-cell { display:inline-block; min-width:50px; padding:5px 8px; border-radius:8px; font-weight:bold; }
  .status { display:inline-flex; padding:4px 8px; border-radius:999px; font-weight:bold; font-size:11px; }
  .good { background:#ecfdf3; color:#15803d; } .mid { background:#fff7ed; color:#c2410c; } .low { background:#fef2f2; color:#dc2626; }
  @media(max-width:1024px) { .grid, .layout2 { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div>
      <h1>3구역 주간 달성률 대시보드</h1>
      <p style="margin:0; color:var(--muted); font-size:13px;">주간 목표 대비 실적 달성률 현황입니다.</p>
    </div>
    <div class="toolbar">
      <label for="weekSelect">기준 주차</label>
      <select id="weekSelect" onchange="loadData()"></select>
      <label for="metricSelect" style="margin-left:10px;">비교 항목</label>
      <select id="metricSelect" onchange="renderAll()"></select>
    </div>
  </section>

  <section class="grid">
    <div class="card">
      <h3>주간 핵심 지표</h3>
      <div class="sub">3구역 전체 목표 및 결과입니다.</div>
      <div id="metrics" class="metric-grid"></div>
    </div>

    <div class="card">
      <h3 id="barsTitle">개인별 달성률 비교</h3>
      <div class="sub">선택한 항목 기준 개인별 달성률입니다.</div>
      <div id="bars" class="bars"></div>
    </div>

    <div class="card">
      <h3>선택 항목 리더</h3>
      <div class="sub">선택 항목 기준 상위 현황입니다.</div>
      <div id="leaders" class="leaders"></div>
    </div>
  </section>

  <section class="layout2">
    <div class="card">
      <h3 id="chartTitle">개인별 막대그래프</h3>
      <div class="sub">목표 달성률 시각화 차트입니다.</div>
      <div class="chartbox"><canvas id="mainChart"></canvas></div>
    </div>

    <div class="card">
      <h3>개인별 달성률 테이블</h3>
      <div class="sub">주간 달성률 히트맵 표입니다.</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>이름</th><th>찾B</th><th>만픽</th><th>찾A</th><th>합B</th><th>평균</th><th>상태</th>
            </tr>
          </thead>
          <tbody id="detailTable"></tbody>
        </table>
      </div>
    </div>
  </section>
</div>

<script>
const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwGp-oDp-__zxx4DFWi36EPmZXIyg___cSDubEEaJGEE0NKBXzGsPUxMI1Gj8aHKkAS/exec";
const METRICS = ["찾B", "만픽", "찾A", "합B"];
let DATA = null;
let mainChart;

// 비교항목 드롭다운 생성
const metricSelect = document.getElementById('metricSelect');
METRICS.forEach(m => {
  const opt = document.createElement('option');
  opt.value = m; opt.textContent = m + " (주간)";
  metricSelect.appendChild(opt);
});

async function loadData() {
  const week = document.getElementById('weekSelect').value;
  const url = week ? `${GOOGLE_SHEET_API_URL}?week=${week}` : GOOGLE_SHEET_API_URL;
  try {
    const res = await fetch(url);
    DATA = await res.json();
    
    // 주차 드롭다운 채우기
    const weekSelect = document.getElementById('weekSelect');
    if (DATA.availableWeeks && weekSelect.children.length === 0) {
      DATA.availableWeeks.forEach(w => {
        const opt = document.createElement('option');
        opt.value = w; opt.textContent = w + " 주간";
        if (w === DATA.selectedWeek) opt.selected = true;
        weekSelect.appendChild(opt);
      });
    }

    renderTopMetrics();
    renderTable();
    renderAll();
  } catch (e) { console.error("데이터 로드 실패", e); }
}

function renderTopMetrics() {
  const el = document.getElementById('metrics');
  el.innerHTML = METRICS.map(m => {
    const t = DATA.totals[m];
    return `
      <div class="metric">
        <div class="label">${m}(주간)</div>
        <div class="value">${t.rate}%</div>
        <div class="delta">목표 ${t.goal} · 결과 ${t.result}</div>
      </div>
    `;
  }).join('');
}

function renderAll() {
  const key = metricSelect.value;
  renderBars(key);
  renderLeaders(key);
  renderMainChart(key);
}

function renderBars(key) {
  document.getElementById('barsTitle').textContent = key + " 개인별 달성률";
  const sorted = [...DATA.rows].sort((a,b) => (b.rate[key]||0) - (a.rate[key]||0));
  const el = document.getElementById('bars');
  el.innerHTML = sorted.map(r => `
    <div class="bar-row">
      <div style="font-weight:bold;">${r.name}</div>
      <div style="color:var(--muted);">${r.zone}</div>
      <div class="track"><div class="fill" style="width:${Math.min(r.rate[key]||0, 100)}%;"></div></div>
      <div style="font-weight:bold; text-align:right;">${r.rate[key]||0}%</div>
    </div>
  `).join('');
}

function renderLeaders(key) {
  const sorted = [...DATA.rows].sort((a,b) => (b.rate[key]||0) - (a.rate[key]||0));
  const top = sorted[0] || { name: '없음', zone: '', rate: {} };
  const over100 = DATA.rows.filter(r => (r.rate[key]||0) >= 100);

  document.getElementById('leaders').innerHTML = `
    <div class="leader">
      <div><span style="font-size:12px;color:var(--muted);">1위 인도자</span><br><strong>${top.name} (${top.zone})</strong></div>
      <div class="badge">${top.rate[key]||0}%</div>
    </div>
    <div class="leader">
      <div><span style="font-size:12px;color:var(--muted);">100% 이상 달성</span><br><strong>${over100.length}명</strong></div>
      <div class="badge">${over100.map(r=>r.name).join(', ') || '없음'}</div>
    </div>
  `;
}

function renderMainChart(key) {
  const ctx = document.getElementById('mainChart');
  document.getElementById('chartTitle').textContent = key + " 달성률 그래프";
  if (mainChart) mainChart.destroy();
  
  const labels = DATA.rows.map(r => r.name);
  const rates = DATA.rows.map(r => r.rate[key] || 0);

  mainChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: key + ' 달성률 (%)',
        data: rates,
        borderRadius: 8,
        backgroundColor: rates.map(v => v >= 100 ? 'rgba(22,163,74,0.85)' : v >= 60 ? 'rgba(217,119,6,0.75)' : 'rgba(220,38,38,0.65)')
      }]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, suggestedMax: 100 } } }
  });
}

function renderTable() {
  const el = document.getElementById('detailTable');
  el.innerHTML = DATA.rows.map(r => {
    const avg = Math.round((r.rate["찾B"] + r.rate["만픽"] + r.rate["찾A"] + r.rate["합B"]) / 4);
    const cls = avg >= 100 ? 'good' : avg >= 60 ? 'mid' : 'low';
    const status = avg >= 100 ? '달성' : avg >= 60 ? '진행' : '보완';
    return `
      <tr>
        <td>${r.name}</td>
        <td><span class="heat-cell">${r.rate["찾B"]}%</span></td>
        <td><span class="heat-cell">${r.rate["만픽"]}%</span></td>
        <td><span class="heat-cell">${r.rate["찾A"]}%</span></td>
        <td><span class="heat-cell">${r.rate["합B"]}%</span></td>
        <td><b>${avg}%</b></td>
        <td><span class="status ${cls}">${status}</span></td>
      </tr>
    `;
  }).join('');
}

loadData();
</script>
</body>
</html>
