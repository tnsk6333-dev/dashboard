<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>전도 달성률 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --bg:#f6f8fc; --panel:#ffffff; --text:#18212f; --muted:#5f6b7a; --line:#d9e1ee; --shadow:0 10px 30px rgba(23,38,66,.08); --radius:20px; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Pretendard","Apple SD Gothic Neo",sans-serif; background:linear-gradient(180deg,#f7f9fd 0%,#eef3fb 100%); color:var(--text); }
  .wrap { max-width:1440px; margin:0 auto; padding:24px 16px; }
  .hero { display:flex; align-items:flex-end; justify-content:space-between; gap:24px; margin-bottom:20px; flex-wrap:wrap; }
  .hero h1 { margin:0 0 6px; font-size:28px; }
  .toolbar { display:flex; gap:12px; align-items:center; background:rgba(255,255,255,.8); padding:10px 16px; border-radius:999px; border:1px solid var(--line); box-shadow:var(--shadow); }
  label { font-size:13px; font-weight:bold; color:var(--muted); }
  select { border:1px solid var(--line); border-radius:999px; padding:8px 12px; font-size:14px; background:#fff; cursor:pointer; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; }
  .card h3 { margin:0 0 4px; font-size:18px; }
  .sub { color:var(--muted); font-size:12px; margin-bottom:14px; }
  .chartbox { height:320px; }
  table { width:100%; border-collapse:collapse; font-size:13px; margin-top:10px; }
  th { background:#f4f8ff; padding:10px; border-bottom:1px solid var(--line); text-align:center; }
  td { padding:10px; border-bottom:1px solid #edf2f9; text-align:center; }
  td:first-child { text-align:left; font-weight:bold; }
  .table-wrap { overflow-x:auto; max-height:400px; border:1px solid var(--line); border-radius:12px; }
  @media(max-width:768px) { .grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div>
      <h1>3구역 전도 현황 대시보드</h1>
      <p style="margin:0; color:var(--muted); font-size:13px;">구글 시트 실시간 연동 대시보드</p>
    </div>
    <div class="toolbar">
      <label for="monthSelect">조회 월</label>
      <select id="monthSelect" onchange="loadData()">
        <option value="">전체 기간</option>
        <option value="2026-01">2026년 1월</option>
        <option value="2026-02">2026년 2월</option>
        <option value="2026-03">2026년 3월</option>
        <option value="2026-04">2026년 4월</option>
      </select>
      <label for="metricSelect" style="margin-left:10px;">비교 항목</label>
      <select id="metricSelect" onchange="renderCharts()"></select>
    </div>
  </section>

  <section class="grid">
    <div class="card">
      <h3 id="chartTitle">인도자별 단계 비교</h3>
      <div class="sub">선택한 단계의 인도자별 누적 달성 인원입니다.</div>
      <div class="chartbox"><canvas id="barChart"></canvas></div>
    </div>
    <div class="card">
      <h3>전체 단계별 합계</h3>
      <div class="sub">3구역 전체 누적 달성 현황입니다.</div>
      <div class="chartbox"><canvas id="summaryChart"></canvas></div>
    </div>
  </section>

  <section class="card">
    <h3>인도자별 상세 달성 현황</h3>
    <div class="sub">모든 단계별 누적 합계 표입니다.</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>인도자</th><th>구역</th><th>찾B</th><th>만픽</th><th>찾A</th><th>합B</th><th>합A</th><th>영따</th><th>복A</th><th>복B</th><th>복C</th><th>센터등록</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
// ⚠️ 아래 URL을 1단계에서 얻은 구글 Apps Script 웹 앱 URL로 바꾸세요!
const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwGp-oDp-__zxx4DFWi36EPmZXIyg___cSDubEEaJGEE0NKBXzGsPUxMI1Gj8aHKkAS/exec
";

const METRICS = ["찾B","만픽","찾A","합B","합A","영따","복A","복B","복C","센터등록"];
let ROWS = [];
let barChart, summaryChart;

// 드롭다운 초기화
const metricSelect = document.getElementById('metricSelect');
METRICS.forEach(m => {
  const opt = document.createElement('option');
  opt.value = m; opt.textContent = m;
  metricSelect.appendChild(opt);
});

async function loadData() {
  const month = document.getElementById('monthSelect').value;
  const url = `${GOOGLE_SHEET_API_URL}?month=${month}`;
  try {
    const res = await fetch(url);
    ROWS = await res.json();
    renderTable();
    renderCharts();
  } catch (e) {
    console.error("데이터 로드 실패", e);
  }
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = ROWS.map(r => `
    <tr>
      <td>${r.name}</td><td>${r.zone}</td>
      ${METRICS.map(m => `<td><b>${r[m] || 0}</b></td>`).join('')}
    </tr>
  `).join('');
}

function renderCharts() {
  const selectedMetric = metricSelect.value;
  document.getElementById('chartTitle').textContent = `인도자별 ${selectedMetric} 달성 현황`;

  // 1. 개인별 막대차트
  const ctx1 = document.getElementById('barChart');
  if(barChart) barChart.destroy();
  barChart = new Chart(ctx1, {
    type:'bar',
    data:{
      labels: ROWS.map(r => r.name),
      datasets:[{
        label: selectedMetric,
        data: ROWS.map(r => r[selectedMetric] || 0),
        backgroundColor: 'rgba(47, 111, 237, 0.85)',
        borderRadius: 8
      }]
    },
    options:{ responsive:true, maintainAspectRatio:false, scales:{ y:{ beginAtZero:true } } }
  });

  // 2. 전체 요약 차트
  const ctx2 = document.getElementById('summaryChart');
  if(summaryChart) summaryChart.destroy();
  const totals = METRICS.map(m => ROWS.reduce((sum, r) => sum + (r[m] || 0), 0));
  summaryChart = new Chart(ctx2, {
    type:'line',
    data:{
      labels: METRICS,
      datasets:[{
        label:'구역 전체 달성수',
        data: totals,
        borderColor:'#16a34a',
        backgroundColor:'rgba(22, 163, 74, 0.1)',
        fill:true,
        tension:0.3
      }]
    },
    options:{ responsive:true, maintainAspectRatio:false, scales:{ y:{ beginAtZero:true } } }
  });
}

loadData();
</script>
</body>
</html>
